name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pdoc

      - name: Build documentation
        run: |
          # 1. Generate HTML (linking to the assets folder)
          # We use a temporary output directory to avoid conflicts
          pdoc --math -d google -o docs_out src/uts \
            --logo "assets/logo.svg" \
            --favicon "assets/logo.svg"

          # 2. Manually copy the assets folder into the output directory so the link works
          cp -r assets docs_out/assets

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs_out
